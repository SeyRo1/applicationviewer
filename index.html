<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Application Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #161310;
    --card: #1d1914;
    --border: #2e2720;
    --border-light: #3d3329;
    --gold: #c9a96e;
    --gold-dim: #8a6e42;
    --text: #e8ddd0;
    --text-dim: #a09080;
    --text-muted: #5e5044;
    --green: #5a9e6f;
    --tag-bg: #231e18;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 17px; line-height: 1.7; min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 24px 40px 20px;
    display: flex; align-items: center; gap: 18px;
    background: linear-gradient(to bottom, #12100d, var(--bg));
    flex-wrap: wrap;
  }
  .header-icon { font-size: 34px; line-height: 1; opacity: .85; }
  .header-text h1 { font-size: 1.7rem; font-weight: 600; color: var(--gold); letter-spacing: .02em; }
  .header-text p { font-size: .88rem; color: var(--text-dim); font-style: italic; margin-top: 2px; }
  .header-actions { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .pill {
    background: var(--tag-bg); border: 1px solid var(--border-light);
    color: var(--text-dim); font-family: 'DM Mono', monospace;
    font-size: .73rem; padding: 5px 14px; border-radius: 20px;
  }
  .import-btn {
    background: var(--card); border: 1px solid var(--gold-dim); color: var(--gold);
    font-family: 'DM Mono', monospace; font-size: .73rem;
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    transition: background .15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .import-btn:hover { background: #27201a; }

  /* Landing */
  #landing {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: calc(100vh - 88px); padding: 40px; text-align: center;
  }
  .drop-zone {
    border: 2px dashed var(--border-light); border-radius: 14px;
    padding: 56px 72px; max-width: 460px; width: 100%;
    cursor: pointer; transition: border-color .2s, background .2s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--gold-dim); background: #1a1510; }
  .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .drop-icon { font-size: 2.8rem; margin-bottom: 14px; opacity: .7; }
  .drop-zone h2 { font-size: 1.35rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .drop-zone p { font-size: .88rem; color: var(--text-dim); font-style: italic; }
  .drop-zone .mono { font-family: 'DM Mono', monospace; font-size: .72rem; color: var(--text-muted); margin-top: 14px; }

  /* App layout */
  #app { display: none; }
  #app.visible { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 88px); }

  aside {
    border-right: 1px solid var(--border); overflow-y: auto;
    padding: 18px 0; background: var(--surface);
  }
  .sidebar-label {
    font-family: 'DM Mono', monospace; font-size: .64rem;
    text-transform: uppercase; letter-spacing: .12em;
    color: var(--text-muted); padding: 0 20px 10px;
  }
  .applicant-btn {
    display: block; width: 100%; text-align: left;
    background: none; border: none; padding: 12px 20px;
    cursor: pointer; border-left: 3px solid transparent;
    transition: background .12s, border-color .12s; position: relative;
  }
  .applicant-btn:hover { background: var(--card); }
  .applicant-btn.active { background: var(--card); border-left-color: var(--gold); }
  .applicant-btn .name { font-size: .98rem; font-weight: 600; color: var(--text); display: block; margin-bottom: 2px; }
  .applicant-btn.active .name { color: var(--gold); }
  .applicant-btn .sub { font-family: 'DM Mono', monospace; font-size: .68rem; color: var(--text-muted); display: block; }
  .applicant-btn .age-badge {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-family: 'DM Mono', monospace; font-size: .66rem; color: var(--gold-dim);
    background: var(--tag-bg); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 10px;
  }

  main { overflow-y: auto; padding: 34px 46px; }

  .app-header {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 28px; padding-bottom: 22px; border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--tag-bg); border: 2px solid var(--border-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem; flex-shrink: 0;
  }
  .app-header-info h2 { font-size: 1.55rem; font-weight: 600; color: var(--text); line-height: 1.2; }
  .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .meta-tag {
    font-family: 'DM Mono', monospace; font-size: .7rem;
    padding: 3px 10px; border-radius: 12px;
    background: var(--tag-bg); border: 1px solid var(--border-light); color: var(--text-dim);
  }
  .meta-tag.gold { color: var(--gold); border-color: var(--gold-dim); }
  .meta-tag.green { color: var(--green); border-color: #2d6e40; }
  .meta-tag.red { color: #c26060; border-color: #6e3030; }
  .submitted { margin-left: auto; text-align: right; font-size: .78rem; color: var(--text-muted); font-style: italic; white-space: nowrap; }

  .section { margin-bottom: 26px; }
  .section-title {
    font-family: 'DM Mono', monospace; font-size: .66rem;
    text-transform: uppercase; letter-spacing: .1em; color: var(--gold-dim);
    margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .question-block {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
  }
  .question-block .q { font-size: .81rem; color: var(--text-muted); font-style: italic; margin-bottom: 7px; }
  .question-block .a { color: var(--text); font-size: .98rem; white-space: pre-wrap; line-height: 1.75; }
  .question-block .a.empty { color: var(--text-muted); font-style: italic; }

  .acknowledge-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 16px; }
  .bool-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: .86rem; color: var(--text-dim);
    padding: 7px 0; border-bottom: 1px solid var(--border);
  }
  .bool-row:last-child { border-bottom: none; }
  .check { color: var(--green); font-size: .95rem; flex-shrink: 0; margin-top: 3px; }
  .cross { color: #c26060; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field-block { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 11px 15px; }
  .field-block .fl { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .07em; }
  .field-block .fv { font-size: .93rem; color: var(--text); }

  .nav-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 34px; padding-top: 20px; border-top: 1px solid var(--border);
  }
  .nav-btn {
    background: var(--card); border: 1px solid var(--border-light); color: var(--text-dim);
    padding: 7px 16px; border-radius: 6px; cursor: pointer;
    font-family: 'DM Mono', monospace; font-size: .73rem;
    transition: border-color .12s, color .12s;
  }
  .nav-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .nav-btn:disabled { opacity: .3; cursor: default; }
  .nav-pos { font-family: 'DM Mono', monospace; font-size: .73rem; color: var(--text-muted); }

  aside::-webkit-scrollbar, main::-webkit-scrollbar { width: 5px; }
  aside::-webkit-scrollbar-track, main::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb, main::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

  @media (max-width: 720px) {
    #app.visible { grid-template-columns: 1fr; height: auto; }
    aside { max-height: 190px; }
    main { padding: 20px; }
    .field-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">📚</div>
  <div class="header-text">
    <h1>Application Viewer</h1>
    <p>Review form submissions, one applicant at a time</p>
  </div>
  <div class="header-actions">
    <span class="pill" id="countPill" style="display:none"></span>
    <label class="import-btn">
      ⬆ Import CSV
      <input type="file" accept=".csv" id="csvInput" style="display:none">
    </label>
  </div>
</header>

<div id="landing">
  <div class="drop-zone" id="dropZone">
    <input type="file" accept=".csv" id="csvDrop">
    <div class="drop-icon">📄</div>
    <h2>Drop your CSV here</h2>
    <p>or click to browse for the file</p>
    <div class="mono">Works with any Google Forms / form export CSV</div>
  </div>
</div>

<div id="app">
  <aside id="sidebar"></aside>
  <main id="main"></main>
</div>

<script>
// ── Column-role heuristics ───────────────────────────────────────────────────
// Maps known semantic roles to likely column header substrings.
// Add or adjust hints here to support other form layouts.
const FIELD_HINTS = {
  roblox:        ['roblox username', 'roblox user', 'roblox'],
  discord:       ['discord username', 'discord user', 'discord'],
  age:           ['your age', ' age'],
  dob:           ['date of birth', 'dob', 'birth'],
  interest:      ['interested in joining', 'why', 'interest', 'motivation'],
  hasMod:        ['past moderation experience', 'moderation experience', 'have you moderated'],
  modExp:        ['past experiences are', 'my past experiences', 'experiences are'],
  sensitive:     ['sensitive', 'controversial', 'objectivity'],
  difficult:     ['difficult decision', 'handle a difficult'],
  pillarPurpose: ['purpose of the fundemental', 'purpose of the fundamental', 'purpose of'],
  pillarsWhat:   ['what are the fundemental', 'what are the fundamental', 'what are the'],
  extra:         ["anything you'd like", 'anything else', 'additional comments'],
  created:       ['created_at', 'submitted_at', 'timestamp', 'submitted', 'date'],
  id:            ['id'],
};

// Columns whose full text starts with these phrases are acknowledgements
const ACK_PREFIXES = ['i understand', 'i hereby', 'i acknowledge', 'i agree'];
// Columns to skip entirely from "other fields"
const SKIP_PREFIXES = ['i do not have', ...ACK_PREFIXES];

function mapColumns(headers) {
  const map = {};
  const used = new Set();

  for (const [role, hints] of Object.entries(FIELD_HINTS)) {
    for (const hint of hints) {
      const match = headers.find(h =>
        !used.has(h) && h.toLowerCase().includes(hint.toLowerCase())
      );
      if (match) { map[role] = match; used.add(match); break; }
    }
  }

  const lc = h => h.toLowerCase();
  map._acks = headers.filter(h => ACK_PREFIXES.some(p => lc(h).startsWith(p)));
  map._acks.forEach(h => used.add(h));

  map._extra = headers.filter(h =>
    !used.has(h) && !SKIP_PREFIXES.some(p => lc(h).startsWith(p))
  );

  return map;
}

// ── RFC-4180 CSV parser ──────────────────────────────────────────────────────
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], nx = text[i+1];
    if (inQ) {
      if (ch === '"' && nx === '"') { field += '"'; i++; }
      else if (ch === '"') inQ = false;
      else field += ch;
    } else {
      if (ch === '"') inQ = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n' || (ch === '\r' && nx === '\n')) {
        row.push(field); field = '';
        if (row.some(c => c !== '')) rows.push(row);
        row = []; if (ch === '\r') i++;
      } else field += ch;
    }
  }
  if (row.length) { row.push(field); if (row.some(c => c !== '')) rows.push(row); }
  return rows;
}

// ── State ────────────────────────────────────────────────────────────────────
let applications = [], colMap = {}, current = 0;

// ── Load ─────────────────────────────────────────────────────────────────────
function loadCSV(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) { alert('CSV appears empty or malformed.'); return; }
  const headers = rows[0];
  colMap = mapColumns(headers);
  applications = rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
    return obj;
  }).filter(r => Object.values(r).some(v => v.trim()));
  if (!applications.length) { alert('No rows found in CSV.'); return; }
  current = 0;
  renderSidebar();
  renderApp(0);
  document.getElementById('landing').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  const pill = document.getElementById('countPill');
  pill.textContent = `${applications.length} applicant${applications.length !== 1 ? 's' : ''}`;
  pill.style.display = '';
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const get = (row, role) => colMap[role] ? (row[colMap[role]] ?? '').trim() : '';
const isTruthy = v => { const s = String(v ?? '').trim().toLowerCase(); return s === 'true' || s === 'yes' || s === '1'; };
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function formatDate(str) {
  if (!str) return '';
  try { const d = new Date(str); return isNaN(d) ? str : d.toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}); }
  catch { return str; }
}

function initials(row) {
  const n = get(row, 'roblox') || get(row, 'discord') || '?';
  return n.slice(0,2).toUpperCase();
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar() {
  const aside = document.getElementById('sidebar');
  aside.innerHTML = '<div class="sidebar-label">Applicants</div>';
  applications.forEach((row, i) => {
    const roblox = get(row,'roblox') || `Applicant ${i+1}`;
    const discord = get(row,'discord');
    const age = get(row,'age');
    const btn = document.createElement('button');
    btn.className = 'applicant-btn' + (i === current ? ' active' : '');
    btn.innerHTML = `<span class="name">${esc(roblox)}</span><span class="sub">${esc(discord)}</span>${age ? `<span class="age-badge">${esc(age)}</span>` : ''}`;
    btn.onclick = () => { current = i; renderApp(i); updateActive(); };
    aside.appendChild(btn);
  });
}

function updateActive() {
  document.querySelectorAll('.applicant-btn').forEach((b, i) => {
    b.classList.toggle('active', i === current);
    b.querySelector('.name').style.color = i === current ? 'var(--gold)' : '';
  });
}

// ── Render ───────────────────────────────────────────────────────────────────
function qBlock(q, a) {
  const empty = !a || !a.trim();
  return `<div class="question-block"><div class="q">${esc(q)}</div><div class="a${empty?' empty':''}">${empty ? 'No answer provided.' : esc(a)}</div></div>`;
}

function renderApp(i) {
  current = i;
  const row = applications[i];
  const roblox   = get(row,'roblox')   || `Applicant ${i+1}`;
  const discord  = get(row,'discord');
  const age      = get(row,'age');
  const dob      = get(row,'dob');
  const hasMod   = isTruthy(get(row,'hasMod'));
  const created  = get(row,'created');
  const id       = get(row,'id');

  // Unmapped columns with actual values
  const extraCols = (colMap._extra || []).filter(col => {
    const v = (row[col]??'').trim();
    return v && v.toLowerCase() !== 'nan';
  });
  const acks = colMap._acks || [];

  // Helper: render a section only if the mapped column exists
  const section = (title, ...blocks) => {
    const content = blocks.filter(Boolean).join('');
    return content ? `<div class="section"><div class="section-title">${title}</div>${content}</div>` : '';
  };

  document.getElementById('main').innerHTML = `
    <div class="app-header">
      <div class="avatar">${esc(initials(row))}</div>
      <div class="app-header-info">
        <h2>${esc(roblox)}</h2>
        <div class="meta">
          ${discord ? `<span class="meta-tag">Discord: ${esc(discord)}</span>` : ''}
          ${age     ? `<span class="meta-tag gold">Age ${esc(age)}</span>` : ''}
          ${dob     ? `<span class="meta-tag">${formatDate(dob)}</span>` : ''}
          <span class="meta-tag ${hasMod?'green':'red'}">${hasMod?'✓ Mod Experience':'No Prior Mod Exp'}</span>
          ${id      ? `<span class="meta-tag">ID: ${esc(id)}</span>` : ''}
        </div>
      </div>
      ${created ? `<div class="submitted">Submitted<br>${esc(created)}</div>` : ''}
    </div>

    ${section('Motivation',
      colMap.interest ? qBlock('Why are you interested in joining the team?', get(row,'interest')) : ''
    )}

    ${section('Moderation Experience',
      colMap.hasMod ? qBlock('Do you have past moderation experience?', get(row,'hasMod')) : '',
      colMap.modExp  ? qBlock('Describe your past experiences:', get(row,'modExp')) : ''
    )}

    ${section('Scenario Questions',
      colMap.sensitive ? qBlock('How do you handle controversial or sensitive subject matter?', get(row,'sensitive')) : '',
      colMap.difficult ? qBlock('How would you handle a difficult moderation decision?', get(row,'difficult')) : ''
    )}

    ${section('Knowledge Check',
      colMap.pillarPurpose ? qBlock('What is the purpose of the Fundamental Pillars?', get(row,'pillarPurpose')) : '',
      colMap.pillarsWhat   ? qBlock('What are the Fundamental Pillars?',               get(row,'pillarsWhat'))   : ''
    )}

    ${extraCols.length ? `<div class="section"><div class="section-title">Other Fields</div>
      <div class="field-grid">${extraCols.map(col => `
        <div class="field-block">
          <div class="fl">${esc(col)}</div>
          <div class="fv">${esc((row[col]??'').trim())}</div>
        </div>`).join('')}
      </div></div>` : ''}

    ${section('Additional Comments',
      colMap.extra ? qBlock("Anything you'd like to add?", get(row,'extra')) : ''
    )}

    ${acks.length ? `<div class="section"><div class="section-title">Acknowledgements</div>
      <div class="acknowledge-box">${acks.map(col => {
        const ok = isTruthy(row[col]);
        return `<div class="bool-row"><span class="check ${ok?'':'cross'}">${ok?'✓':'✗'}</span><span>${esc(col)}</span></div>`;
      }).join('')}</div></div>` : ''}

    <div class="nav-bar">
      <button class="nav-btn" onclick="navigate(-1)" ${i===0?'disabled':''}>← Previous</button>
      <span class="nav-pos">${i+1} / ${applications.length}</span>
      <button class="nav-btn" onclick="navigate(1)"  ${i===applications.length-1?'disabled':''}>Next →</button>
    </div>
  `;

  document.getElementById('main').scrollTop = 0;
  updateActive();
  const btns = document.querySelectorAll('.applicant-btn');
  if (btns[i]) btns[i].scrollIntoView({ block:'nearest', behavior:'smooth' });
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < applications.length) renderApp(n);
}

// ── File handling ────────────────────────────────────────────────────────────
function handleFile(file) {
  if (!file) return;
  if (!file.name.endsWith('.csv')) { alert('Please select a .csv file.'); return; }
  const r = new FileReader();
  r.onload = e => loadCSV(e.target.result);
  r.readAsText(file);
}

document.getElementById('csvInput').addEventListener('change', e => { handleFile(e.target.files[0]); e.target.value=''; });
document.getElementById('csvDrop').addEventListener('change',  e => { handleFile(e.target.files[0]); e.target.value=''; });

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!applications.length) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
});
</script>
</body>
</html>
